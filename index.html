  <head>

    <title>NeuroTime - Gestion Personnelle</title>
    
    <!-- PWA Meta Tags -->
    <meta name="description" content="Application de gestion personnelle pour freelances - Suivi de missions et statistiques" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Splash Screen Meta Tags -->
    <meta name="apple-touch-fullscreen" content="yes" />
    
    <!-- Icons -->

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.json" />
    
    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Color scheme: declare dark intent to browser chrome & system UI -->
    <meta name="color-scheme" content="dark" />

    <!-- Splash Screen CSS (for native PWA splash) -->
    <style>
      body {
        background: #080b14;
        margin: 0;
        overflow-x: hidden;
        overflow-y: auto;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
    </style>

    <!-- Fonts — Precision Instrument Trio (must match index.css @import) -->
    <!-- DNS prefetch already declared above via preconnect -->

      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap"

    />
